<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Rush: Efsaneler</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        :root {
            --bg: #09090e; --surface: #161824; --surface-light: #25283a;
            --primary: #8a2be2; --secondary: #00d2ff;
            --success: #00e676; --error: #ff1744; --warning: #ffea00;
        }
        
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; user-select: none; }
        
        body { margin: 0; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .app-container {
            width: 100%; max-width: 450px; height: 100%; max-height: 850px;
            background: var(--surface); position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 25px; display: none; flex-direction: column;
            animation: slideIn 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .active { display: flex; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Top Bar (Header) */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: var(--surface-light); padding: 10px 20px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .stat { display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .stat i { font-style: normal; font-size: 1.2rem; }
        .coin-text { color: var(--warning); }
        .lvl-text { color: var(--secondary); }

        h1 { text-align: center; font-size: 2.5rem; margin: 10px 0; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 30px; }

        /* Buttons */
        .btn {
            width: 100%; padding: 18px; margin: 10px 0; border: none; border-radius: 16px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.2s;
            background: linear-gradient(135deg, var(--surface-light), #2a2d42); color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn:active { transform: scale(0.96); }
        .btn-play { background: linear-gradient(135deg, var(--primary), #5e17a3); box-shadow: 0 10px 20px rgba(138, 43, 226, 0.4); text-align: center; justify-content: center; }
        .btn-option { background: var(--surface-light); border: 2px solid transparent; justify-content: center; }
        
        /* Game Screen Elements */
        #timer-container { text-align: center; margin-bottom: 20px; }
        #timer { font-size: 3.5rem; font-weight: 800; color: var(--warning); text-shadow: 0 0 20px rgba(255, 234, 0, 0.4); }
        #question-box { background: var(--surface-light); padding: 25px 15px; border-radius: 20px; text-align: center; font-size: 1.2rem; min-height: 120px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Jokers */
        .jokers { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .joker-btn { background: var(--surface-light); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; width: 30%; color: white; cursor: pointer; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .joker-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .joker-price { color: var(--warning); font-size: 0.75rem; font-weight: bold; }

        .correct { background: var(--success) !important; color: #000; box-shadow: 0 0 20px rgba(0,230,118,0.5); }
        .wrong { background: var(--error) !important; box-shadow: 0 0 20px rgba(255,23,68,0.5); }
        .hidden-option { opacity: 0; pointer-events: none; }

        /* Level Bar */
        .xp-container { width: 100%; height: 10px; background: #222; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        .xp-bar { height: 100%; background: var(--secondary); width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

<div class="app-container">

    <div class="top-bar" id="global-header">
        <div class="stat"><i class="lvl-text">⭐</i> Lvl <span id="ui-level">1</span></div>
        <div class="stat"><i class="coin-text">🪙</i> <span id="ui-coins">0</span></div>
    </div>

    <div id="home-screen" class="screen active">
        <h1 style="margin-top: 40px;">QUIZ RUSH</h1>
        <p class="subtitle">Bildiğin kadar kazanırsın!</p>
        
        <div style="background: var(--surface-light); padding: 15px; border-radius: 15px; margin-bottom: 30px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem;">
                <span>Sonraki Seviye</span>
                <span id="ui-xp-text">0/100 XP</span>
            </div>
            <div class="xp-container"><div class="xp-bar" id="ui-xp-bar"></div></div>
        </div>

        <button class="btn btn-play" onclick="showScreen('category-screen')">▶ OYNA</button>
        <button class="btn" onclick="alert('Yakında: Puanlarla profil resmi ve özel temalar alabileceksin!')">🛒 Market</button>
        <button class="btn" onclick="resetData()">⚙️ İlerlemeyi Sıfırla</button>
    </div>

    <div id="category-screen" class="screen">
        <h1>Kategoriler</h1>
        <p class="subtitle">Bir alan seç ve yarışa başla</p>
        <button class="btn" onclick="startGame('genel')">🌍 Genel Kültür <span>></span></button>
        <button class="btn" onclick="startGame('bilim')">🔬 Bilim & Teknoloji <span>></span></button>
        <button class="btn" onclick="startGame('tarih')">📜 Tarih <span>></span></button>
        <button class="btn" style="background: #2a2d42; justify-content: center; margin-top: auto;" onclick="showScreen('home-screen')">Geri Dön</button>
    </div>

    <div id="game-screen" class="screen">
        <div style="display: flex; justify-content: space-between; color: #888; font-weight: bold; margin-bottom: 10px;">
            <span id="game-category-title">Kategori</span>
            <span id="question-counter">1/10</span>
        </div>
        
        <div class="jokers">
            <button class="joker-btn" id="joker-50" onclick="useJoker('5050')">
                <span>🌗 %50</span><span class="joker-price">🪙 20</span>
            </button>
            <button class="joker-btn" id="joker-time" onclick="useJoker('time')">
                <span>❄️ Dondur</span><span class="joker-price">🪙 30</span>
            </button>
            <button class="joker-btn" id="joker-skip" onclick="useJoker('skip')">
                <span>⏭️ Geç</span><span class="joker-price">🪙 50</span>
            </button>
        </div>

        <div id="timer-container"><div id="timer">15</div></div>
        
        <div id="question-box">Soru yükleniyor...</div>
        
        <div id="options-container" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>

    <div id="result-screen" class="screen" style="justify-content: center; align-items: center; text-align: center;">
        <h1 id="result-title">Oyun Bitti!</h1>
        <div style="background: var(--surface-light); padding: 30px; border-radius: 20px; width: 100%; margin: 20px 0;">
            <p style="font-size: 1.2rem; margin: 10px 0;">Doğru: <span id="res-correct" style="color:var(--success); font-weight:bold;">0</span></p>
            <p style="font-size: 1.2rem; margin: 10px 0;">Kazanılan Altın: <span id="res-coins" class="coin-text" style="font-weight:bold;">+0</span></p>
            <p style="font-size: 1.2rem; margin: 10px 0;">Kazanılan XP: <span id="res-xp" class="lvl-text" style="font-weight:bold;">+0</span></p>
        </div>
        <button class="btn btn-play" onclick="showScreen('home-screen')">Ana Menüye Dön</button>
    </div>

</div>

<script>
    // --- VERİTABANI VE KAYIT SİSTEMİ ---
    let player = {
        coins: parseInt(localStorage.getItem('qr_coins')) || 100, // Başlangıç hediyesi 100 altın
        level: parseInt(localStorage.getItem('qr_level')) || 1,
        xp: parseInt(localStorage.getItem('qr_xp')) || 0
    };

    function saveData() {
        localStorage.setItem('qr_coins', player.coins);
        localStorage.setItem('qr_level', player.level);
        localStorage.setItem('qr_xp', player.xp);
        updateUI();
    }

    function updateUI() {
        document.getElementById('ui-coins').innerText = player.coins;
        document.getElementById('ui-level').innerText = player.level;
        
        let xpNeeded = player.level * 100;
        if(player.xp >= xpNeeded) {
            player.level++;
            player.xp -= xpNeeded;
            alert(`🎉 TEBRİKLER! Seviye ${player.level} oldun! +50 Altın Ödül!`);
            player.coins += 50;
            xpNeeded = player.level * 100;
        }
        document.getElementById('ui-xp-text').innerText = `${player.xp}/${xpNeeded} XP`;
        document.getElementById('ui-xp-bar').style.width = `${(player.xp / xpNeeded) * 100}%`;
    }

    function resetData() {
        if(confirm("Tüm altın, seviye ve ilerlemen silinecek. Emin misin?")) {
            localStorage.clear(); location.reload();
        }
    }

    // --- SORU HAVUZU (Büyük Veri Seti) ---
    const allQuestions = {
        genel: [
            { s: "Türkiye'nin başkenti neresidir?", c: ["İstanbul", "Ankara", "İzmir", "Bursa"], d: "Ankara" },
            { s: "Olimpiyat halkaları kaç tanedir?", c: ["4", "5", "6", "7"], d: "5" },
            { s: "Hangi hayvan ses telleri olmadığı için ses çıkaramaz?", c: ["Zürafa", "Gergedan", "Hipopotam", "Fil"], d: "Zürafa" },
            { s: "Mona Lisa tablosu kime aittir?", c: ["Da Vinci", "Picasso", "Van Gogh", "Michelangelo"], d: "Da Vinci" },
            { s: "Bir satranç tahtasında kaç kare vardır?", c: ["64", "62", "60", "66"], d: "64" },
            { s: "Dünyanın en küçük ülkesi hangisidir?", c: ["Monako", "Vatikan", "Malta", "Nauru"], d: "Vatikan" },
            { s: "Hangi gezegenin halkaları vardır?", c: ["Mars", "Venüs", "Satürn", "Uranüs"], d: "Satürn" },
            { s: "İngilizcenin en çok kullanıldığı kıta?", c: ["Avrupa", "Kuzey Amerika", "Avustralya", "Asya"], d: "Kuzey Amerika" }
        ],
        bilim: [
            { s: "Suyun kimyasal formülü nedir?", c: ["CO2", "H2O", "O2", "NaCl"], d: "H2O" },
            { s: "İnsan vücudunda kanı pompalayan organ?", c: ["Beyin", "Akciğer", "Kalp", "Mide"], d: "Kalp" },
            { s: "Güneş sistemindeki en büyük gezegen?", c: ["Mars", "Jüpiter", "Satürn", "Neptün"], d: "Jüpiter" },
            { s: "Elektrik ampulünü kim icat etti?", c: ["Tesla", "Edison", "Newton", "Einstein"], d: "Edison" },
            { s: "Periyodik tablonun ilk elementi nedir?", c: ["Oksijen", "Helyum", "Karbon", "Hidrojen"], d: "Hidrojen" },
            { s: "Ses uzayda yayılır mı?", c: ["Evet", "Hayır", "Sadece gezegenlerde", "Bilinmiyor"], d: "Hayır" },
            { s: "DNA'nın açılımı nedir?", c: ["Deoksiribonükleik Asit", "Dinamik Nükleer Asit", "Derin Nükleik Asit", "Di Nükleotid"], d: "Deoksiribonükleik Asit" }
        ],
        tarih: [
            { s: "İstanbul kaç yılında fethedildi?", c: ["1453", "1071", "1299", "1526"], d: "1453" },
            { s: "Türkiye Cumhuriyeti ne zaman kuruldu?", c: ["1920", "1923", "1919", "1921"], d: "1923" },
            { s: "Fransız İhtilali kaç yılında oldu?", c: ["1789", "1799", "1804", "1815"], d: "1789" },
            { s: "İlk yazıyı hangi uygarlık bulmuştur?", c: ["Mısırlılar", "Sümerler", "Hititler", "Romalılar"], d: "Sümerler" },
            { s: "Roma İmparatorluğu ikiye ne zaman bölündü?", c: ["395", "476", "1453", "1071"], d: "395" },
            { s: "Çin Seddi hangi amaçla yapılmıştır?", c: ["Sınır belirlemek", "Turizm", "Moğol saldırılarından korunmak", "Ticaret"], d: "Moğol saldırılarından korunmak" }
        ]
    };

    // --- OYUN DEĞİŞKENLERİ ---
    let currentQuestions = [];
    let qIndex = 0;
    let timerInterval;
    let timeLeft = 15;
    let sessionCorrect = 0;
    let timeFrozen = false;

    // --- OYUN MEKANİKLERİ ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'home-screen') document.getElementById('global-header').style.display = 'flex';
        else if(id === 'result-screen') document.getElementById('global-header').style.display = 'none';
    }

    // Soruları karıştırma (Randomize)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function startGame(cat) {
        // Seçilen kategoriden rastgele 5 soru al
        let pool = [...allQuestions[cat]];
        shuffleArray(pool);
        currentQuestions = pool.slice(0, 5); 
        
        let titles = { genel: "Genel Kültür", bilim: "Bilim & Teknoloji", tarih: "Tarih" };
        document.getElementById('game-category-title').innerText = titles[cat];
        
        qIndex = 0; sessionCorrect = 0;
        resetJokers();
        showScreen('game-screen');
        loadQuestion();
    }

    function loadQuestion() {
        if(qIndex >= currentQuestions.length) { endGame(); return; }
        
        timeFrozen = false;
        document.getElementById('question-counter').innerText = `${qIndex + 1}/${currentQuestions.length}`;
        let q = currentQuestions[qIndex];
        document.getElementById('question-box').innerText = q.s;
        
        let optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = "";
        
        // Şıkları da karıştır
        let options = [...q.c];
        shuffleArray(options);
        
        options.forEach(opt => {
            let btn = document.createElement("button");
            btn.className = "btn btn-option";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt, q.d);
            optsContainer.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        timeLeft = 15;
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('timer').style.color = "var(--warning)";
        clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            if(!timeFrozen) timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 5) document.getElementById('timer').style.color = "var(--error)";
            
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("⏰ Süre Doldu!");
                qIndex++;
                loadQuestion();
            }
        }, 1000);
    }

    function checkAnswer(btn, selected, correct) {
        clearInterval(timerInterval);
        let allBtns = document.querySelectorAll('.btn-option');
        allBtns.forEach(b => b.style.pointerEvents = 'none'); // Tıklamayı kapat
        
        if(selected === correct) {
            btn.classList.add('correct');
            sessionCorrect++;
            setTimeout(() => { qIndex++; loadQuestion(); }, 1000);
        } else {
            btn.classList.add('wrong');
            // Doğruyu göster
            allBtns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
            setTimeout(() => { qIndex++; loadQuestion(); }, 1500);
        }
    }

    // --- JOKER SİSTEMİ ---
    function resetJokers() {
        document.querySelectorAll('.joker-btn').forEach(btn => {
            btn.disabled = false;
        });
    }

    function useJoker(type) {
        let costs = { '5050': 20, 'time': 30, 'skip': 50 };
        if(player.coins < costs[type]) {
            alert(`Yetersiz Altın! ${costs[type]} altına ihtiyacın var.`);
            return;
        }

        player.coins -= costs[type];
        saveData();

        if(type === '5050') {
            document.getElementById('joker-50').disabled = true;
            let correctAns = currentQuestions[qIndex].d;
            let btns = Array.from(document.querySelectorAll('.btn-option'));
            let wrongBtns = btns.filter(b => b.innerText !== correctAns);
            // 2 yanlış şıkkı gizle
            wrongBtns[0].classList.add('hidden-option');
            wrongBtns[1].classList.add('hidden-option');
        } 
        else if(type === 'time') {
            document.getElementById('joker-time').disabled = true;
            timeFrozen = true;
            document.getElementById('timer').innerText = "❄️";
        }
        else if(type === 'skip') {
            document.getElementById('joker-skip').disabled = true;
            clearInterval(timerInterval);
            qIndex++;
            loadQuestion();
        }
    }

    // --- OYUN SONU HESAPLAMALARI ---
    function endGame() {
        clearInterval(timerInterval);
        
        let earnedCoins = sessionCorrect * 10; // Her doğru 10 altın
        let earnedXp = sessionCorrect * 25;    // Her doğru 25 XP
        
        player.coins += earnedCoins;
        player.xp += earnedXp;
        saveData();

        document.getElementById('result-title').innerText = sessionCorrect > 2 ? "Harika İş!" : "Daha İyi Olabilir";
        document.getElementById('res-correct').innerText = `${sessionCorrect} / 5`;
        document.getElementById('res-coins').innerText = `+${earnedCoins} 🪙`;
        document.getElementById('res-xp').innerText = `+${earnedXp} XP`;
        
        showScreen('result-screen');
    }

    // Oyunu başlatırken verileri yükle
    updateUI();
</script>
</body>
</html>
